name: PatchProof Action

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify with local action
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create semantic fixture repository
        id: fixture
        shell: bash
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/patchproof-action-fixture"
          mkdir -p "$fixture"
          cd "$fixture"
          git init --initial-branch=main
          git config user.name "PatchProof Action Test"
          git config user.email "action-test@patchproof.local"
          cat > patchproof.yml <<'YAML'
          version: 1
          commands:
            reproduce:
              runtime: node
              harness_root: .patchproof/harness
              entrypoint: reproduce.js
              expected_exit_code:
                base: 1
                head: 0
            test:
              run: node test.js
          YAML
          cat > app.js <<'JS'
          exports.fixed = () => false;
          JS
          mkdir -p .patchproof/harness
          cat > .patchproof/harness/reproduce.js <<'JS'
          const { spawnSync } = require("node:child_process");
          const { readFileSync, writeFileSync } = require("node:fs");
          const challenge = JSON.parse(readFileSync(3, "utf8"));
          const targetScript = "const { fixed } = require(" + JSON.stringify("./app.js") + "); process.exit(fixed() ? 0 : 1);";
          const target = spawnSync(process.execPath, ["-e", targetScript], {
            cwd: process.cwd(),
            encoding: "utf8",
            env: { PATH: process.env.PATH || "" }
          });
          const status = target.status === 0 ? "assertion_passed" : "assertion_failed";
          writeFileSync(4, `${JSON.stringify({ nonce: challenge.nonce, status })}\n`);
          process.exit(status === "assertion_passed" ? 0 : 1);
          JS
          cat > test.js <<'JS'
          process.exit(0);
          JS
          git add .
          git commit -m "base bug"
          base="$(git rev-parse HEAD)"
          cat > app.js <<'JS'
          exports.fixed = () => true;
          JS
          git add app.js
          git commit -m "head fix"
          head="$(git rev-parse HEAD)"
          echo "repo=$fixture" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: PatchProof verify
        uses: ./packages/github-action
        with:
          repo-path: ${{ steps.fixture.outputs.repo }}
          base-ref: ${{ steps.fixture.outputs.base }}
          head-ref: ${{ steps.fixture.outputs.head }}

      - name: PatchProof verify current pull request
        if: github.event_name == 'pull_request'
        uses: ./packages/github-action
        with:
          config: .github/patchproof-pr-smoke.yml
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
